<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom Aesthetics — AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">🌸</div>
          <div>
            <div class="logo-name">Bloom Aesthetics</div>
            <div class="logo-sub">AI Assistant</div>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Session</div>
        <div class="session-info">
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="status-badge" id="statusBadge">Active</span>
          </div>
          <div class="info-row">
            <span class="info-label">Stage</span>
            <span class="stage-badge" id="stageBadge">FAQ</span>
          </div>
          <div class="info-row">
            <span class="info-label">Session ID</span>
            <span class="session-id" id="sessionIdDisplay">—</span>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Services</div>
        <div class="service-list">
          <div class="service-item">
            <div class="service-name">Botox</div>
            <div class="service-price">from £200</div>
          </div>
          <div class="service-item">
            <div class="service-name">Dermal Fillers</div>
            <div class="service-price">from £250</div>
          </div>
          <div class="service-item">
            <div class="service-name">Consultation</div>
            <div class="service-price">Free</div>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Hours</div>
        <div class="hours-info">
          <div class="hours-row">Mon – Sat</div>
          <div class="hours-time">9:00 AM – 7:00 PM</div>
          <div class="hours-closed">Closed Sundays & Bank Holidays</div>
        </div>
      </div>

      <div class="sidebar-footer">
        <button class="btn-new-chat" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          New Conversation
        </button>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">

      <!-- Top bar -->
      <header class="chat-header">
        <div class="chat-header-left">
          <div class="aria-avatar">A</div>
          <div>
            <div class="aria-name">Aria</div>
            <div class="aria-status">
              <span class="online-dot"></span>
              <span id="headerStatus">Online · FAQ Stage</span>
            </div>
          </div>
        </div>
        <div class="chat-header-right">
          <button class="btn-icon" id="endSessionBtn" title="End session">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </header>

      <!-- Messages -->
      <div class="messages-container" id="messagesContainer">
        <div class="messages-inner" id="messagesInner">
          <!-- Messages injected here -->
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typingIndicator" style="display:none">
        <div class="typing-avatar">A</div>
        <div class="typing-bubble">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area" id="inputArea">
        <div class="input-wrap">
          <textarea
            id="messageInput"
            placeholder="Type your message..."
            rows="1"
            maxlength="500"
          ></textarea>
          <button class="btn-send" id="sendBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="quick-label">Quick:</span>
          <button class="quick-btn" data-msg="How much does Botox cost?">Botox pricing</button>
          <button class="quick-btn" data-msg="How do I book an appointment?">Book appointment</button>
          <button class="quick-btn" data-msg="What are your opening hours?">Opening hours</button>
        </div>
      </div>

    </main>

    <!-- Summary panel (hidden until session ends) -->
    <div class="summary-overlay" id="summaryOverlay" style="display:none">
      <div class="summary-panel">
        <div class="summary-header">
          <div class="summary-icon">📋</div>
          <div>
            <div class="summary-title">Session Summary</div>
            <div class="summary-sub">Powered by Closira AI</div>
          </div>
          <button class="btn-close-summary" id="closeSummaryBtn">✕</button>
        </div>
        <div class="summary-body" id="summaryBody">
          <!-- Summary content injected here -->
        </div>
        <div class="summary-footer">
          <button class="btn-new-chat-summary" id="newChatSummaryBtn">Start New Conversation</button>
        </div>
      </div>
    </div>

  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
